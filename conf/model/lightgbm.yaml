# LightGBM default hyperparameters
# Overridden at runtime by Optuna tuning results

objective: binary
metric: average_precision
verbose: -1
n_jobs: -1
random_state: 42

# Class imbalance
is_unbalance: true

# Tree structure
num_leaves: 63
max_depth: -1
min_child_samples: 50

# Learning
learning_rate: 0.05
n_estimators: 1000
early_stopping_rounds: 50

# Regularisation
reg_alpha: 0.1
reg_lambda: 0.1
feature_fraction: 0.8
bagging_fraction: 0.8
bagging_freq: 5

# Optuna search bounds (used by tuner.py)
optuna:
  n_trials: 50
  direction: maximize    # maximise AUC-PR
  search_space:
    num_leaves: [20, 300]
    learning_rate: [0.005, 0.3]
    min_child_samples: [20, 500]
    feature_fraction: [0.5, 1.0]
    bagging_fraction: [0.5, 1.0]
    reg_alpha: [0.0, 10.0]
    reg_lambda: [0.0, 10.0]
