name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt && pip install -e .

      - name: Lint (ruff)
        run: ruff check src/churn tests

      - name: Format check (ruff)
        run: ruff format --check src/churn tests

      - name: Type check (mypy)
        run: mypy src/churn --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt && pip install -e .

      - name: Run unit tests
        run: pytest tests/unit -v --cov=src/churn --cov-report=xml

      - name: Run data quality (leakage) tests
        run: pytest tests/data_quality -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
