# docker-compose.yml — local development & demo stack
# Usage:  docker compose up -d
#         docker compose logs -f api
#         docker compose run --rm training
version: "3.9"

services:
  # ── Scoring API ───────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ../outputs/model_artefacts:/app/outputs/model_artefacts:ro
      - ../conf:/app/conf:ro
    environment:
      - CHURN_ENV=production
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - churn-net

  # ── Training (run on demand) ──────────────────────────────────
  training:
    build:
      context: ..
      dockerfile: docker/Dockerfile.training
    volumes:
      - ../data:/app/data
      - ../outputs:/app/outputs
      - ../conf:/app/conf:ro
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    profiles:
      - training          # only starts with:  docker compose --profile training run training
    networks:
      - churn-net

  # ── MLflow tracking server ────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    command: >
      mlflow server
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --default-artifact-root /mlflow/artefacts
        --host 0.0.0.0
        --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped
    networks:
      - churn-net

volumes:
  mlflow-data:

networks:
  churn-net:
    driver: bridge
